# HiveOS custom-miner manifest for rdna3-kawpow.
# The folder name under /hive/miners/custom/ MUST equal CUSTOM_NAME.
CUSTOM_NAME=rdna3kawpow
CUSTOM_VERSION=0.1.0
CUSTOM_BUILD=1

# Base port for the per-GPU JSON stats API; GPU i serves on CUSTOM_API_PORT_BASE+i.
CUSTOM_API_PORT_BASE=4068

# Generated by h-config.sh, consumed by h-run.sh / h-stats.sh.
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/rdna3kawpow/rdna3kawpow.conf
CUSTOM_LOG_BASENAME=/var/log/miner/rdna3kawpow/rdna3kawpow
